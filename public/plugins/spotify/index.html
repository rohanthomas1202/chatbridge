<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spotify Playlist Creator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #121212 0%, #1a1a2e 100%);
      color: #e0e0e0;
      padding: 16px;
      min-height: 100vh;
    }
    .loading { text-align: center; padding: 40px; color: #8892b0; }
    .playlist-card {
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
      overflow: hidden;
    }
    .playlist-header {
      background: linear-gradient(135deg, #1DB954 0%, #1aa34a 100%);
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .spotify-logo { font-size: 28px; }
    .playlist-title { font-size: 18px; font-weight: 700; color: white; }
    .playlist-subtitle { font-size: 12px; color: rgba(255,255,255,0.8); }
    .track-list { padding: 8px 0; }
    .track {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 16px;
      transition: background 0.15s;
    }
    .track:hover { background: rgba(255,255,255,0.05); }
    .track-num {
      width: 20px;
      text-align: right;
      font-size: 13px;
      color: #8892b0;
      flex-shrink: 0;
    }
    .track-art {
      width: 36px;
      height: 36px;
      background: rgba(255,255,255,0.08);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }
    .track-info { flex: 1; min-width: 0; }
    .track-name {
      font-size: 14px;
      font-weight: 500;
      color: #e0e0e0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .track-artist {
      font-size: 12px;
      color: #8892b0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .track-duration { font-size: 12px; color: #8892b0; flex-shrink: 0; }
    .mock-badge {
      margin: 8px 16px 12px;
      padding: 6px 10px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      font-size: 11px;
      color: #8892b0;
      text-align: center;
    }
    .auth-btn {
      display: block;
      margin: 12px auto;
      background: #1DB954;
      color: white;
      border: none;
      padding: 10px 24px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .auth-btn:hover { background: #1ed760; }
    .success-badge {
      margin: 8px 16px 12px;
      padding: 8px 12px;
      background: rgba(29, 185, 84, 0.15);
      border: 1px solid rgba(29, 185, 84, 0.3);
      border-radius: 6px;
      font-size: 12px;
      color: #1DB954;
      text-align: center;
      font-weight: 600;
    }
    .error-badge {
      margin: 8px 16px 12px;
      padding: 8px 12px;
      background: rgba(255, 100, 100, 0.1);
      border: 1px solid rgba(255, 100, 100, 0.3);
      border-radius: 6px;
      font-size: 12px;
      color: #ff6b6b;
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="loading">Waiting for playlist data...</div>
  </div>

  <script>
    const PLUGIN_ID = 'chatbridge-spotify';
    const ICONS = ['🎵', '🎶', '🎸', '🎹', '🥁', '🎷', '🎺', '🎻', '🎤', '🎼'];
    const SPOTIFY_CLIENT_ID = 'd6fb087703014f1aa9cdafaea946fd43';
    const REDIRECT_URI = window.location.origin + '/plugins/spotify/callback';
    const SCOPES = 'playlist-modify-public playlist-modify-private';

    let pendingPlaylist = null;

    /* ── PKCE Helpers ── */
    function generateCodeVerifier() {
      const array = new Uint8Array(32);
      crypto.getRandomValues(array);
      return btoa(String.fromCharCode.apply(null, array))
        .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    }

    async function generateCodeChallenge(verifier) {
      const data = new TextEncoder().encode(verifier);
      const hash = await crypto.subtle.digest('SHA-256', data);
      return btoa(String.fromCharCode.apply(null, new Uint8Array(hash)))
        .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    }

    /* ── Spotify API ── */
    async function searchTrack(query, token) {
      const res = await fetch('https://api.spotify.com/v1/search?q=' + encodeURIComponent(query) + '&type=track&limit=1', {
        headers: { Authorization: 'Bearer ' + token }
      });
      const data = await res.json();
      return data.tracks && data.tracks.items && data.tracks.items[0] ? data.tracks.items[0].uri : null;
    }

    async function createSpotifyPlaylist(name, tracks, token) {
      // Get user ID
      const meRes = await fetch('https://api.spotify.com/v1/me', {
        headers: { Authorization: 'Bearer ' + token }
      });
      const me = await meRes.json();

      // Create playlist
      const plRes = await fetch('https://api.spotify.com/v1/users/' + me.id + '/playlists', {
        method: 'POST',
        headers: {
          Authorization: 'Bearer ' + token,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ name: name, public: true })
      });
      const playlist = await plRes.json();

      // Search and add tracks
      var uris = [];
      for (var i = 0; i < tracks.length; i++) {
        var uri = await searchTrack(tracks[i], token);
        if (uri) uris.push(uri);
      }

      if (uris.length > 0) {
        await fetch('https://api.spotify.com/v1/playlists/' + playlist.id + '/tracks', {
          method: 'POST',
          headers: {
            Authorization: 'Bearer ' + token,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ uris: uris })
        });
      }

      return { playlistId: playlist.id, url: playlist.external_urls.spotify, tracksAdded: uris.length };
    }

    /* ── OAuth Flow ── */
    async function startOAuth() {
      var verifier = generateCodeVerifier();
      sessionStorage.setItem('spotify_code_verifier', verifier);
      sessionStorage.setItem('spotify_pending_playlist', JSON.stringify(pendingPlaylist));

      var challenge = await generateCodeChallenge(verifier);
      var params = new URLSearchParams({
        client_id: SPOTIFY_CLIENT_ID,
        response_type: 'code',
        redirect_uri: REDIRECT_URI,
        scope: SCOPES,
        code_challenge_method: 'S256',
        code_challenge: challenge,
      });

      window.open('https://accounts.spotify.com/authorize?' + params.toString(), '_blank');
    }

    async function exchangeCode(code) {
      var verifier = sessionStorage.getItem('spotify_code_verifier');
      var res = await fetch('https://accounts.spotify.com/api/token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams({
          client_id: SPOTIFY_CLIENT_ID,
          grant_type: 'authorization_code',
          code: code,
          redirect_uri: REDIRECT_URI,
          code_verifier: verifier,
        })
      });
      var data = await res.json();
      return data.access_token;
    }

    /* ── Rendering ── */
    function parseTracks(tracks) {
      return tracks.map(function(t, i) {
        var parts = t.split(' - ');
        var name = parts[0] || t;
        var artist = parts[1] || 'Unknown Artist';
        var min = 2 + Math.floor(Math.random() * 4);
        var sec = Math.floor(Math.random() * 60);
        return {
          num: i + 1,
          name: name.trim(),
          artist: artist.trim(),
          duration: min + ':' + sec.toString().padStart(2, '0'),
          icon: ICONS[i % ICONS.length],
        };
      });
    }

    function renderPlaylist(name, tracks, mode, extraHTML) {
      var parsed = parseTracks(tracks);
      var totalMin = parsed.reduce(function(sum, t) {
        var p = t.duration.split(':').map(Number);
        return sum + p[0] + p[1] / 60;
      }, 0);

      var trackHTML = parsed.map(function(t) {
        return '<div class="track">' +
          '<div class="track-num">' + t.num + '</div>' +
          '<div class="track-art">' + t.icon + '</div>' +
          '<div class="track-info">' +
            '<div class="track-name">' + t.name + '</div>' +
            '<div class="track-artist">' + t.artist + '</div>' +
          '</div>' +
          '<div class="track-duration">' + t.duration + '</div>' +
        '</div>';
      }).join('');

      document.getElementById('app').innerHTML =
        '<div class="playlist-card">' +
          '<div class="playlist-header">' +
            '<div class="spotify-logo">🎧</div>' +
            '<div>' +
              '<div class="playlist-title">' + name + '</div>' +
              '<div class="playlist-subtitle">' + parsed.length + ' tracks · ~' + Math.round(totalMin) + ' min</div>' +
            '</div>' +
          '</div>' +
          '<div class="track-list">' + trackHTML + '</div>' +
          (extraHTML || '') +
        '</div>';
    }

    /* ── Check for OAuth callback ── */
    var urlParams = new URLSearchParams(window.location.search);
    var authCode = urlParams.get('code');

    if (authCode) {
      // We're on the callback page — exchange code for token
      document.getElementById('app').innerHTML = '<div class="loading">Connecting to Spotify...</div>';

      (async function() {
        try {
          var token = await exchangeCode(authCode);
          var saved = JSON.parse(sessionStorage.getItem('spotify_pending_playlist') || '{}');

          if (saved.name && saved.tracks) {
            document.getElementById('app').innerHTML = '<div class="loading">Creating playlist...</div>';
            var result = await createSpotifyPlaylist(saved.name, saved.tracks, token);

            renderPlaylist(saved.name, saved.tracks, 'real',
              '<div class="success-badge">Playlist created on Spotify! ' + result.tracksAdded + ' tracks added. ' +
              '<a href="' + result.url + '" target="_blank" style="color:#1DB954">Open in Spotify</a></div>');

            // Clean up
            window.history.replaceState({}, '', window.location.pathname);
            sessionStorage.removeItem('spotify_code_verifier');
            sessionStorage.removeItem('spotify_pending_playlist');
          } else {
            document.getElementById('app').innerHTML = '<div class="loading" style="color:#ff6b6b">No pending playlist found.</div>';
          }
        } catch(e) {
          document.getElementById('app').innerHTML = '<div class="error-badge">OAuth error: ' + e.message + '</div>';
        }
      })();
    }

    /* ── Plugin message handler ── */
    window.addEventListener('message', function(event) {
      var data = event.data;
      if (!data || data.type !== 'plugin:invoke') return;
      if (data.pluginId !== PLUGIN_ID) return;

      var args = data.args || {};
      var name = args.name || 'My Playlist';
      var tracks = Array.isArray(args.tracks) ? args.tracks : [];

      if (tracks.length === 0) {
        document.getElementById('app').innerHTML =
          '<div class="loading" style="color:#ff6b6b">No tracks provided.</div>';
        return;
      }

      pendingPlaylist = { name: name, tracks: tracks };

      // Check if we have a cached token
      var token = sessionStorage.getItem('spotify_access_token');

      if (token) {
        // Try to create playlist with cached token
        renderPlaylist(name, tracks, 'creating',
          '<div class="mock-badge">Creating playlist on Spotify...</div>');

        createSpotifyPlaylist(name, tracks, token).then(function(result) {
          renderPlaylist(name, tracks, 'real',
            '<div class="success-badge">Playlist created on Spotify! ' + result.tracksAdded + ' tracks added. ' +
            '<a href="' + result.url + '" target="_blank" style="color:#1DB954">Open in Spotify</a></div>');

          window.parent.postMessage({
            type: 'plugin:complete',
            pluginId: PLUGIN_ID,
            toolCallId: data.toolCallId,
            result: { mode: 'real', playlistUrl: result.url, tracksAdded: result.tracksAdded }
          }, '*');
        }).catch(function() {
          // Token expired — show auth button
          sessionStorage.removeItem('spotify_access_token');
          renderPlaylist(name, tracks, 'mock',
            '<button class="auth-btn" onclick="startOAuth()">Connect with Spotify</button>' +
            '<div class="mock-badge">Preview mode — click above to create a real playlist</div>');

          window.parent.postMessage({
            type: 'plugin:complete',
            pluginId: PLUGIN_ID,
            toolCallId: data.toolCallId,
            result: { mode: 'mock', playlistName: name, trackCount: tracks.length }
          }, '*');
        });
      } else {
        // No token — show preview with auth button
        renderPlaylist(name, tracks, 'mock',
          '<button class="auth-btn" onclick="startOAuth()">Connect with Spotify</button>' +
          '<div class="mock-badge">Preview mode — click above to create a real playlist</div>');

        window.parent.postMessage({
          type: 'plugin:complete',
          pluginId: PLUGIN_ID,
          toolCallId: data.toolCallId,
          result: { mode: 'mock', playlistName: name, trackCount: tracks.length }
        }, '*');
      }
    });

    // Signal ready
    window.parent.postMessage({ type: 'plugin:ready', pluginId: PLUGIN_ID }, '*');
  </script>
</body>
</html>
